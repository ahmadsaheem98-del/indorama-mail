<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mail System Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
}

/* ================= BACKGROUND CIRCLES ================= */

.circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
}

.circle1{
    width:250px;
    height:250px;
    top:-80px;
    left:-80px;
}

.circle2{
    width:300px;
    height:300px;
    bottom:-120px;
    right:-120px;
}

.circle3{
    width:180px;
    height:180px;
    bottom:120px;
    left:100px;
}

/* ================= LOGIN CARD ================= */

.login-box{
    width:420px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.2);
    padding:40px;
    border-radius:28px;
    box-shadow:0 10px 40px rgba(0,0,0,0.3);
    color:white;
    z-index:10;
}

/* ================= LOGO ================= */

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo img{
    width:95px;
    height:95px;
    background:white;
    border-radius:50%;
    padding:8px;
    object-fit:contain;
}

.logo h1{
    margin-top:15px;
    font-size:30px;
    font-weight:700;
}

.logo p{
    color:#d1d5db;
    margin-top:5px;
}

/* ================= INPUT ================= */

.input-group{
    margin-bottom:20px;
}

.input-group label{
    margin-bottom:8px;
    display:block;
    font-weight:600;
}

.input-box{
    position:relative;
}

.input-box i{
    position:absolute;
    top:50%;
    left:15px;
    transform:translateY(-50%);
    color:#94a3b8;
}

.input-box input{
    width:100%;
    padding:14px 14px 14px 45px;
    border:none;
    border-radius:12px;
    outline:none;
    background:rgba(255,255,255,0.15);
    color:white;
    font-size:15px;
}

.input-box input::placeholder{
    color:#cbd5e1;
}

/* ================= BUTTON ================= */

.login-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:#2563eb;
    color:white;
    font-size:16px;
    font-weight:600;
    transition:0.3s;
    margin-top:10px;
}

.login-btn:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

/* ================= DEMO ================= */

.demo-box{
    margin-top:25px;
    background:rgba(255,255,255,0.08);
    padding:15px;
    border-radius:14px;
}

.demo-box h5{
    margin-bottom:10px;
    font-size:16px;
}

.demo-box p{
    margin-bottom:5px;
    font-size:14px;
    color:#e2e8f0;
}

/* ================= MOBILE ================= */

@media(max-width:500px){

    .login-box{
        width:92%;
        padding:25px;
    }

    .logo h1{
        font-size:24px;
    }

}

</style>

</head>

<body>

<!-- BACKGROUND -->

<div class="circle circle1"></div>
<div class="circle circle2"></div>
<div class="circle circle3"></div>

<!-- LOGIN CARD -->

<div class="login-box">

    <!-- LOGO -->

    <div class="logo">

        <img src="{{ url_for('static', filename='download.png') }}">

        <h1>MAIL SYSTEM</h1>

        <p>Secure Mail Approval Portal</p>

    </div>

    <!-- LOGIN FORM -->

    <form method="POST">

        <div class="input-group">

            <label>Username</label>

            <div class="input-box">

                <i class="fa-solid fa-user"></i>

                <input type="text"
                name="username"
                placeholder="Enter username"
                required>

            </div>

        </div>

        <div class="input-group">

            <label>Password</label>

            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input type="password"
                name="password"
                placeholder="Enter password"
                required>

            </div>

        </div>

        <button type="submit" class="login-btn">

            <i class="fa-solid fa-right-to-bracket"></i>

            Login

        </button>

    </form>

    

</div>

</body>
</html>
